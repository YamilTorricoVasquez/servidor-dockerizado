version: '3.9'

services:
  biometrico:
    build: .
    container_name: biometrico-server
    restart: always

    ports:
      - "5000:5000"

    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000

    volumes:
      - biometrico_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  biometrico_data: