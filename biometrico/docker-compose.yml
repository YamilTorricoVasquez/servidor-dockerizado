services:
  biometrico:
    build: .
    container_name: biometrico-server
    restart: always

    ports:
      - "5000:5000"

    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - DB_HOST=db
      - DB_NAME=biometrico
      - DB_USER=postgres
      - DB_PASSWORD=postgres

    depends_on:
      - db

  db:
    image: postgres:15
    container_name: biometrico-db
    restart: always

    environment:
      POSTGRES_DB: biometrico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: