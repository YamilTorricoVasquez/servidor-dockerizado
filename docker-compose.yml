version: '3.9'

services:
  pos-integration:
    build: .
    container_name: pos-integration-server
    restart: unless-stopped
    ports:
      - "5454:5454"
      - "8000:8000"
    environment:
      - NODE_ENV=production
  biometrico-zkteco-k50:
    build: .
    container_name: biometrico-zkteco-k50
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production